name: Deploy to server

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy, for example v0.1.8. Empty = latest."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-server
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH update
    runs-on: ubuntu-latest
    if: ${{ vars.DISABLE_DEPLOY != 'true' }}
    timeout-minutes: 25

    steps:
      - name: Verify required secrets
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail

          missing=()
          [ -n "${DEPLOY_HOST:-}" ] || missing+=(DEPLOY_HOST)
          [ -n "${DEPLOY_USER:-}" ] || missing+=(DEPLOY_USER)
          [ -n "${DEPLOY_SSH_KEY:-}" ] || missing+=(DEPLOY_SSH_KEY)

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Determine target tag
        id: target
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG=""
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved deploy tag: '${TAG:-(latest)}'"

      - name: Configure SSH
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          KNOWN: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$SSH_KEY" | tr -d '\r' > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

          ssh-keygen -y -f ~/.ssh/id_deploy > ~/.ssh/id_deploy.pub || {
            echo "::error::DEPLOY_SSH_KEY is not a valid unencrypted private key."
            exit 1
          }

          echo "Deploy public key fingerprint:"
          ssh-keygen -lf ~/.ssh/id_deploy.pub

          if [ -n "${KNOWN:-}" ]; then
            printf '%s\n' "$KNOWN" | tr -d '\r' > ~/.ssh/known_hosts
          else
            echo "DEPLOY_KNOWN_HOSTS not set; scanning ${DEPLOY_HOST} from GitHub runner..."
            ssh-keyscan -H -T 15 "$DEPLOY_HOST" > ~/.ssh/known_hosts 2>/dev/null
          fi

          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "::error::Could not get SSH host key for ${DEPLOY_HOST}."
            exit 1
          fi

          chmod 644 ~/.ssh/known_hosts

          cat > ~/.ssh/config <<EOF
          Host oci-prod
            HostName ${DEPLOY_HOST}
            User ${DEPLOY_USER}
            IdentityFile ~/.ssh/id_deploy
            IdentitiesOnly yes
            BatchMode yes
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
            ConnectTimeout 30
            ServerAliveInterval 15
            ServerAliveCountMax 3
          EOF

          chmod 600 ~/.ssh/config

          echo "Testing SSH login..."
          ssh oci-prod 'echo "SSH OK"; whoami; hostname; uptime'

      - name: Run update on the server
        shell: bash
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '~/matrix-hub' }}
          UPDATE_SCRIPT: ${{ vars.UPDATE_SCRIPT || 'scripts/update.sh' }}
          TARGET_TAG: ${{ steps.target.outputs.tag }}
        run: |
          set -euo pipefail

          ssh oci-prod \
            DEPLOY_PATH="${DEPLOY_PATH}" \
            UPDATE_SCRIPT="${UPDATE_SCRIPT}" \
            TARGET_TAG="${TARGET_TAG}" \
            'bash -s' <<'REMOTE_SCRIPT'
          set -euo pipefail

          cd "${DEPLOY_PATH}"
          git fetch --tags --prune

          if [ -n "${TARGET_TAG:-}" ]; then
            AUTO=1 TARGET_TAG="${TARGET_TAG}" bash "${UPDATE_SCRIPT}"
          else
            AUTO=1 bash "${UPDATE_SCRIPT}"
          fi
          REMOTE_SCRIPT

      - name: Smoke test
        shell: bash
        env:
          PROBE_URL: ${{ vars.PROBE_URL || 'https://api.matrixhub.io/health?check_db=true' }}
        run: |
          set -euo pipefail

          sleep 10

          status="$(curl -sS -o /tmp/health.json -w '%{http_code}' --max-time 20 "$PROBE_URL" || echo 000)"
          echo "Probe ${PROBE_URL} -> HTTP ${status}"

          if [ -s /tmp/health.json ]; then
            head -c 1000 /tmp/health.json
            echo
          fi

          if [ "$status" != "200" ]; then
            echo "::warning::Smoke probe returned HTTP ${status}."
          fi

      - name: Summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Server deploy"
            echo
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Tag: \`${{ steps.target.outputs.tag || '(latest)' }}\`"
            echo "- Host: \`${{ secrets.DEPLOY_HOST }}\`"
            echo "- User: \`${{ secrets.DEPLOY_USER }}\`"
            echo "- Path: \`${{ vars.DEPLOY_PATH || '~/matrix-hub' }}\`"
            echo "- Script: \`${{ vars.UPDATE_SCRIPT || 'scripts/update.sh' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
