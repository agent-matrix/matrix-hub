name: "Deploy to Oracle Cloud"

on:
  workflow_run:
    workflows: ["📦 Publish Docker (Docker Hub)"]
    types: [completed]

  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy. Default: latest"
        required: false
        default: "latest"

permissions:
  contents: read

concurrency:
  group: deploy-oci
  cancel-in-progress: false

env:
  DOCKER_IMAGE: ruslanmv/matrix-hub
  CONTAINER_NAME: matrix-hub
  HUB_PORT: 443
  GATEWAY_PORT: 4444
  PUBLIC_HEALTH_URL: https://api.matrixhub.io/health?check_db=true
  TLS_HOST_DIR: /etc/ssl/matrixhub
  # uid/gid the container runs as (USER app in the Dockerfile). The
  # `matrixhub_data` Docker volume must be writable by this uid; we
  # enforce it on every deploy so a stale volume from an older image
  # build can't break gunicorn workers with PermissionError on
  # /app/data/blobs.
  CONTAINER_UID: "999"
  CONTAINER_GID: "999"
  # Resource caps for a 1 GB OCI E2.1.Micro instance.
  # Leave ~100 MB headroom for sshd / systemd / kernel.
  CONTAINER_MEMORY: 900m
  CONTAINER_CPUS: "0.9"
  # Keep this many .env.bak.<ts> files on the VM; older ones are deleted.
  ENV_BACKUPS_TO_KEEP: 10

jobs:
  deploy:
    name: Deploy to OCI
    runs-on: ubuntu-latest

    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required secrets
        shell: bash
        env:
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_USER: ${{ secrets.OCI_USER }}
          OCI_SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          CF_ORIGIN_CERT: ${{ secrets.CF_ORIGIN_CERT }}
          CF_ORIGIN_KEY:  ${{ secrets.CF_ORIGIN_KEY }}
          AIVEN_DATABASE_URL: ${{ secrets.AIVEN_DATABASE_URL }}
        run: |
          set -euo pipefail

          missing=()
          [ -n "${OCI_HOST:-}" ] || missing+=(OCI_HOST)
          [ -n "${OCI_USER:-}" ] || missing+=(OCI_USER)
          [ -n "${OCI_SSH_PRIVATE_KEY:-}" ] || missing+=(OCI_SSH_PRIVATE_KEY)

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "Required secrets:"
            echo "  OCI_HOST=129.213.165.60"
            echo "  OCI_USER=ubuntu"
            echo "  OCI_SSH_PRIVATE_KEY=<full OpenSSH private key>"
            echo
            echo "Optional secrets:"
            echo "  OCI_KNOWN_HOSTS=<ssh-keyscan output>"
            echo "  CF_ORIGIN_CERT=<full PEM contents of cf-origin.pem>"
            echo "  CF_ORIGIN_KEY =<full PEM contents of cf-origin.key>"
            echo "  AIVEN_DATABASE_URL=postgresql+psycopg://avnadmin:<PW>@pg-37455d5-matrixhub-db.c.aivencloud.com:24870/defaultdb?sslmode=require"
            exit 1
          fi

          if [ -n "${CF_ORIGIN_CERT:-}" ] && [ -z "${CF_ORIGIN_KEY:-}" ]; then
            echo "::error::CF_ORIGIN_CERT is set but CF_ORIGIN_KEY is not. Set both or neither."
            exit 1
          fi
          if [ -z "${CF_ORIGIN_CERT:-}" ] && [ -n "${CF_ORIGIN_KEY:-}" ]; then
            echo "::error::CF_ORIGIN_KEY is set but CF_ORIGIN_CERT is not. Set both or neither."
            exit 1
          fi

          # Defensive sanity check on the DB URL scheme. SQLAlchemy needs the
          # driver-prefixed form; a raw postgres:// URL works at the psql CLI
          # but blows up with "Can't load plugin" in this app.
          if [ -n "${AIVEN_DATABASE_URL:-}" ]; then
            case "$AIVEN_DATABASE_URL" in
              postgresql+psycopg://*|postgresql+asyncpg://*)
                echo "AIVEN_DATABASE_URL scheme looks correct."
                ;;
              postgres://*|postgresql://*)
                echo "::error::AIVEN_DATABASE_URL must use postgresql+psycopg:// (this app is SQLAlchemy/psycopg3). Got: ${AIVEN_DATABASE_URL%%:*}://..."
                exit 1
                ;;
              *)
                echo "::warning::AIVEN_DATABASE_URL has an unusual scheme; will be applied verbatim."
                ;;
            esac
          fi

      - name: Determine image tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.image_tag || 'latest' }}"
          else
            TAG="latest"
          fi

          echo "TAG=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Deploying ${DOCKER_IMAGE}:${TAG}"

      - name: Configure SSH
        shell: bash
        env:
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_USER: ${{ secrets.OCI_USER }}
          OCI_SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          OCI_KNOWN_HOSTS: ${{ secrets.OCI_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$OCI_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key

          ssh-keygen -y -f ~/.ssh/oci_key > ~/.ssh/oci_key.pub || {
            echo "::error::OCI_SSH_PRIVATE_KEY is not a valid unencrypted private key."
            exit 1
          }

          # Best-practice #1: never print the public key itself in logs.
          # Fingerprint only (SHA256) is sufficient to identify the key
          # without exposing routable material.
          echo "Deploy key fingerprint:"
          ssh-keygen -l -f ~/.ssh/oci_key.pub

          if [ -n "${OCI_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$OCI_KNOWN_HOSTS" | tr -d '\r' > ~/.ssh/known_hosts
          else
            echo "OCI_KNOWN_HOSTS not set; scanning ${OCI_HOST}..."
            ssh-keyscan -H -T 15 -t ed25519,rsa,ecdsa "$OCI_HOST" > ~/.ssh/known_hosts 2>/dev/null
          fi

          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "::error::No SSH host key found for ${OCI_HOST}. Check TCP/22."
            exit 1
          fi

          chmod 644 ~/.ssh/known_hosts

          cat > ~/.ssh/config <<EOF
          Host oci-prod
            HostName ${OCI_HOST}
            User ${OCI_USER}
            IdentityFile ~/.ssh/oci_key
            IdentitiesOnly yes
            BatchMode yes
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
            ConnectTimeout 30
            ServerAliveInterval 15
            ServerAliveCountMax 3
            PreferredAuthentications publickey
            PasswordAuthentication no
            KbdInteractiveAuthentication no
          EOF

          chmod 600 ~/.ssh/config

          echo "Testing SSH login..."
          ssh oci-prod 'echo "SSH OK"; whoami; hostname; uptime'

      - name: Install Cloudflare Origin Cert on host (if secrets provided)
        shell: bash
        env:
          CF_ORIGIN_CERT: ${{ secrets.CF_ORIGIN_CERT }}
          CF_ORIGIN_KEY:  ${{ secrets.CF_ORIGIN_KEY }}
          TLS_HOST_DIR:   ${{ env.TLS_HOST_DIR }}
        run: |
          set -euo pipefail

          if [ -z "${CF_ORIGIN_CERT:-}" ] || [ -z "${CF_ORIGIN_KEY:-}" ]; then
            echo "CF_ORIGIN_CERT / CF_ORIGIN_KEY not provided — skipping install."
            echo "The next step will verify ${TLS_HOST_DIR}/cf-origin.{pem,key} are already present on the VM."
            exit 0
          fi

          # Validate locally first — never push a broken pair to the VM.
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          printf '%s\n' "$CF_ORIGIN_CERT" | tr -d '\r' > "$tmp/cf-origin.pem"
          printf '%s\n' "$CF_ORIGIN_KEY"  | tr -d '\r' > "$tmp/cf-origin.key"

          if ! openssl x509 -in "$tmp/cf-origin.pem" -noout -subject -issuer -dates >/dev/null 2>&1; then
            echo "::error::CF_ORIGIN_CERT is not a parseable X.509 PEM."
            exit 1
          fi

          if ! openssl pkey -in "$tmp/cf-origin.key" -noout >/dev/null 2>&1; then
            echo "::error::CF_ORIGIN_KEY is not a parseable PEM private key (or it is passphrase-protected)."
            exit 1
          fi

          # SPKI-hash match: works for both RSA and ECDSA Origin Certs.
          cert_hash="$(openssl x509  -in "$tmp/cf-origin.pem" -pubkey -noout 2>/dev/null \
                       | openssl pkey -pubin -outform DER 2>/dev/null \
                       | openssl dgst -sha256 -hex | awk '{print $NF}')"
          key_hash="$(openssl pkey  -in "$tmp/cf-origin.key" -pubout -outform DER 2>/dev/null \
                       | openssl dgst -sha256 -hex | awk '{print $NF}')"
          if [ -z "$cert_hash" ] || [ -z "$key_hash" ] || [ "$cert_hash" != "$key_hash" ]; then
            echo "::error::CF_ORIGIN_CERT and CF_ORIGIN_KEY do NOT match (public-key SPKI mismatch)."
            echo "  cert pubkey sha256: $cert_hash"
            echo "  key  pubkey sha256: $key_hash"
            exit 1
          fi

          echo "Cert/key pair validated locally:"
          openssl x509 -in "$tmp/cf-origin.pem" -noout -subject -issuer -dates -fingerprint -sha256 \
            | sed 's/^/  /'
          if openssl x509 -in "$tmp/cf-origin.pem" -noout -checkend 604800 >/dev/null 2>&1; then
            echo "  expires:    in more than 7 days (OK)"
          else
            echo "::warning::Cert expires within 7 days (or already has). Renew via Cloudflare → SSL/TLS → Origin Server."
          fi

          echo "Shipping cert + key to ${TLS_HOST_DIR} on the VM..."
          scp -i ~/.ssh/oci_key \
              -o StrictHostKeyChecking=yes \
              -o IdentitiesOnly=yes \
              "$tmp/cf-origin.pem" "$tmp/cf-origin.key" \
              oci-prod:/tmp/

          # NOTE on permissions:
          # The matrix-hub image runs gunicorn as a non-root user (USER app
          # in the Dockerfile, uid 999). With 0640 root:root on the key, that
          # container user can't read it and gunicorn falls back to plaintext
          # on :443 → Cloudflare 525. So we use 0644 root:root for BOTH cert
          # and key (matches the canonical scripts/install_certificate.sh,
          # with the comment "tighten later if you run TLS as root inside the
          # container"). The key is still mounted read-only into the
          # container.
          ssh oci-prod TLS_HOST_DIR="${TLS_HOST_DIR}" bash -s <<'REMOTE'
          set -euo pipefail
          DEST="${TLS_HOST_DIR:-/etc/ssl/matrixhub}"
          sudo mkdir -p "$DEST"
          sudo install -m 0644 -o root -g root /tmp/cf-origin.pem "$DEST/cf-origin.pem"
          sudo install -m 0644 -o root -g root /tmp/cf-origin.key "$DEST/cf-origin.key"
          rm -f /tmp/cf-origin.pem /tmp/cf-origin.key
          echo "Installed:"
          sudo ls -l "$DEST/cf-origin.pem" "$DEST/cf-origin.key"
          if command -v openssl >/dev/null; then
            sudo openssl x509 -in "$DEST/cf-origin.pem" -noout -subject -issuer -dates -fingerprint -sha256 \
              | sed 's/^/  /'
          fi
          REMOTE

      - name: Deploy via SSH
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.TAG }}
          TLS_HOST_DIR: ${{ env.TLS_HOST_DIR }}
          CONTAINER_MEMORY: ${{ env.CONTAINER_MEMORY }}
          CONTAINER_CPUS: ${{ env.CONTAINER_CPUS }}
          CONTAINER_UID: ${{ env.CONTAINER_UID }}
          CONTAINER_GID: ${{ env.CONTAINER_GID }}
          ENV_BACKUPS_TO_KEEP: ${{ env.ENV_BACKUPS_TO_KEEP }}
          AIVEN_DATABASE_URL: ${{ secrets.AIVEN_DATABASE_URL }}
        run: |
          set -euo pipefail

          ssh oci-prod \
              TAG="${TAG}" \
              TLS_HOST_DIR="${TLS_HOST_DIR}" \
              CONTAINER_MEMORY="${CONTAINER_MEMORY}" \
              CONTAINER_CPUS="${CONTAINER_CPUS}" \
              CONTAINER_UID="${CONTAINER_UID}" \
              CONTAINER_GID="${CONTAINER_GID}" \
              ENV_BACKUPS_TO_KEEP="${ENV_BACKUPS_TO_KEEP}" \
              AIVEN_DATABASE_URL="${AIVEN_DATABASE_URL}" \
              bash -s <<'DEPLOY_SCRIPT'
          set -euo pipefail

          IMAGE="ruslanmv/matrix-hub"
          TAG="${TAG:-latest}"
          CONTAINER="matrix-hub"
          LEGACY_NAMES=("matrixhub")
          TLS_DIR="${TLS_HOST_DIR:-/etc/ssl/matrixhub}"
          MEM="${CONTAINER_MEMORY:-900m}"
          CPUS="${CONTAINER_CPUS:-0.9}"
          UID_INSIDE="${CONTAINER_UID:-999}"
          GID_INSIDE="${CONTAINER_GID:-999}"
          KEEP_BACKUPS="${ENV_BACKUPS_TO_KEEP:-10}"

          echo "=== Host info ==="
          whoami; hostname; uptime
          echo "Free memory:"
          free -h | sed 's/^/  /'

          echo "=== Detecting env file ==="
          ENV_FILE=""
          for candidate in \
            "${HOME}/matrix-hub/.env" \
            "/home/ubuntu/matrix-hub/.env" \
            "/home/opc/matrix-hub/.env"
          do
            if [ -f "$candidate" ]; then
              ENV_FILE="$candidate"
              break
            fi
          done

          if [ -z "$ENV_FILE" ] || [ ! -f "$ENV_FILE" ]; then
            echo "ERROR: no .env file found." >&2
            echo "Expected one of:" >&2
            echo "  ${HOME}/matrix-hub/.env" >&2
            echo "  /home/ubuntu/matrix-hub/.env" >&2
            echo "  /home/opc/matrix-hub/.env" >&2
            exit 1
          fi
          echo "=== Using env file: $ENV_FILE ==="

          echo "=== Checking Cloudflare Origin Cert at ${TLS_DIR} ==="
          if ! sudo test -d "${TLS_DIR}" \
             || ! sudo test -s "${TLS_DIR}/cf-origin.pem" \
             || ! sudo test -s "${TLS_DIR}/cf-origin.key"; then
            echo "::error::Missing TLS material at ${TLS_DIR}/cf-origin.{pem,key}."
            echo "Either set CF_ORIGIN_CERT and CF_ORIGIN_KEY repo secrets, or"
            echo "place the files manually on the VM at ${TLS_DIR}/."
            exit 1
          fi
          echo "TLS material present:"
          sudo ls -l "${TLS_DIR}/cf-origin.pem" "${TLS_DIR}/cf-origin.key" \
            | sed 's/^/  /'

          echo "=== Backing up .env (keeping last ${KEEP_BACKUPS}) ==="
          ENV_DIR="$(dirname "$ENV_FILE")"
          ENV_BASE="$(basename "$ENV_FILE")"
          cp "$ENV_FILE" "${ENV_FILE}.bak.$(date +%Y%m%d-%H%M%S)"
          # Rotate: keep the newest ${KEEP_BACKUPS}, delete older ones.
          ls -1tr "${ENV_DIR}/${ENV_BASE}.bak."* 2>/dev/null \
            | head -n -"${KEEP_BACKUPS}" \
            | xargs -r rm -f
          echo "Backups in ${ENV_DIR}:"
          ls -1t "${ENV_DIR}/${ENV_BASE}.bak."* 2>/dev/null \
            | head -n "${KEEP_BACKUPS}" \
            | sed 's/^/  /' || true

          echo "=== Normalizing database URL to Aiven (if AIVEN_DATABASE_URL secret is set) ==="
          # Make Aiven the source of truth on every deploy. Without this, an
          # operator-edited .env can drift back to the OL9 fallback IP and
          # /status will report a different DB to what the architecture doc
          # promises. The supervisord-driven select_database_url.sh script
          # still consumes DATABASE_URL_PRIMARY/FALLBACK if you later split
          # them out — for now we just write the canonical one.
          if [ -n "${AIVEN_DATABASE_URL:-}" ]; then
            # Use a `|` delimiter for sed so we don't have to escape the
            # `/`, `:`, `@`, `?`, `=`, or `&` characters that postgres URLs
            # love to contain. The URL itself must not contain `|`.
            for key in DATABASE_URL DATABASE_URL_PRIMARY SQLALCHEMY_DATABASE_URI DB_URL; do
              if grep -qE "^${key}=" "$ENV_FILE"; then
                sed -i "s|^${key}=.*|${key}=${AIVEN_DATABASE_URL}|" "$ENV_FILE"
              fi
            done
            # Ensure DATABASE_URL exists even if the .env didn't have it.
            grep -q '^DATABASE_URL=' "$ENV_FILE" || echo "DATABASE_URL=${AIVEN_DATABASE_URL}" >> "$ENV_FILE"
            echo "DATABASE_URL is now Aiven (password masked):"
            grep -E '^(DATABASE_URL|DATABASE_URL_PRIMARY|SQLALCHEMY_DATABASE_URI|DB_URL)=' "$ENV_FILE" \
              | sed -E 's#(://[^:]+:)[^@]+(@)#\1***\2#' \
              | sed 's/^/  /'
          else
            echo "::warning::AIVEN_DATABASE_URL secret not provided; keeping DATABASE_URL from .env"
            grep -E '^(DATABASE_URL|DATABASE_URL_PRIMARY|SQLALCHEMY_DATABASE_URI|DB_URL)=' "$ENV_FILE" \
              | sed -E 's#(://[^:]+:)[^@]+(@)#\1***\2#' \
              | sed 's/^/  /' || true
          fi

          echo "=== Normalizing .env values for Docker --env-file ==="
          # We touch ONLY the SEARCH_*/RERANK_DEFAULT enums here. Pydantic
          # rejects values like 'none          # options: pgtrgm | none'
          # (the inline comment leaks into the value), so we replace those
          # known keys with canonical values. We deliberately do NOT touch
          # HOST/PORT — supervisord.conf hard-codes the Hub on :443 and
          # mcpgateway on :4444 via CLI flags, so any HOST/PORT in the .env
          # is now ignored anyway.
          sed -i \
            -e 's/^SEARCH_LEXICAL_BACKEND=.*/SEARCH_LEXICAL_BACKEND=none/' \
            -e 's/^SEARCH_VECTOR_BACKEND=.*/SEARCH_VECTOR_BACKEND=none/' \
            -e 's/^SEARCH_BACKEND__LEXICAL=.*/SEARCH_BACKEND__LEXICAL=none/' \
            -e 's/^SEARCH_BACKEND__VECTOR=.*/SEARCH_BACKEND__VECTOR=none/' \
            -e 's/^SEARCH_DEFAULT_MODE=.*/SEARCH_DEFAULT_MODE=keyword/' \
            -e 's/^RERANK_DEFAULT=.*/RERANK_DEFAULT=none/' \
            "$ENV_FILE"

          grep -q '^SEARCH_LEXICAL_BACKEND=' "$ENV_FILE" || echo 'SEARCH_LEXICAL_BACKEND=none' >> "$ENV_FILE"
          grep -q '^SEARCH_VECTOR_BACKEND=' "$ENV_FILE" || echo 'SEARCH_VECTOR_BACKEND=none' >> "$ENV_FILE"
          grep -q '^SEARCH_BACKEND__LEXICAL=' "$ENV_FILE" || echo 'SEARCH_BACKEND__LEXICAL=none' >> "$ENV_FILE"
          grep -q '^SEARCH_BACKEND__VECTOR=' "$ENV_FILE" || echo 'SEARCH_BACKEND__VECTOR=none' >> "$ENV_FILE"
          grep -q '^SEARCH_DEFAULT_MODE=' "$ENV_FILE" || echo 'SEARCH_DEFAULT_MODE=keyword' >> "$ENV_FILE"
          grep -q '^RERANK_DEFAULT=' "$ENV_FILE" || echo 'RERANK_DEFAULT=none' >> "$ENV_FILE"

          python3 - "$ENV_FILE" <<'PY'
          import pathlib
          import re
          import sys

          path = pathlib.Path(sys.argv[1])
          lines = path.read_text().splitlines()
          cleaned = []

          for line in lines:
              stripped = line.lstrip()

              if not line or stripped.startswith("#") or "=" not in line:
                  cleaned.append(line)
                  continue

              key, sep, value = line.partition("=")
              value_lstrip = value.lstrip()

              if value_lstrip.startswith(('"', "'", "[", "{")):
                  cleaned.append(line)
                  continue

              value = re.sub(r"\s+#.*$", "", value).rstrip()
              cleaned.append(f"{key}{sep}{value}")

          path.write_text("\n".join(cleaned) + "\n")
          PY

          echo "Effective search config:"
          grep -E '^(SEARCH_LEXICAL_BACKEND|SEARCH_VECTOR_BACKEND|SEARCH_BACKEND__LEXICAL|SEARCH_BACKEND__VECTOR|SEARCH_DEFAULT_MODE|RERANK_DEFAULT)=' "$ENV_FILE"

          echo "=== Pulling ${IMAGE}:${TAG} ==="
          docker pull "${IMAGE}:${TAG}"

          echo "=== Stopping canonical and legacy containers ==="
          for name in "$CONTAINER" "${LEGACY_NAMES[@]}"; do
            if docker ps -a --format '{{.Names}}' | grep -qx "$name"; then
              echo "Stopping/removing $name"
              docker stop "$name" >/dev/null 2>&1 || true
              docker rm   "$name" >/dev/null 2>&1 || true
            fi
          done

          echo "=== Stopping containers holding :443 or :4444 ==="
          mapfile -t holders < <(
            docker ps --format '{{.ID}} {{.Names}} {{.Ports}}' \
              | awk '/(:|->)443\/tcp|->4444\/tcp/ {print $1, $2}'
          )
          if [ "${#holders[@]}" -gt 0 ]; then
            for line in "${holders[@]}"; do
              id="${line%% *}"
              name="${line#* }"
              echo "Stopping/removing $name ($id)"
              docker stop "$id" >/dev/null 2>&1 || true
              docker rm   "$id" >/dev/null 2>&1 || true
            done
          else
            echo "No running Docker container is holding :443 or :4444."
          fi

          if command -v ss >/dev/null 2>&1; then
            held443="$(sudo -n ss -ltnp 2>/dev/null | awk '$4 ~ /:443$/' || true)"
            if [ -n "$held443" ]; then
              echo "::warning::A non-Docker process is bound to :443:"
              echo "$held443" | sed 's/^/  /'
            fi
          fi

          echo "=== Initializing matrixhub_data volume ownership (uid=${UID_INSIDE} gid=${GID_INSIDE}) ==="
          # The matrix-hub image runs as USER app (uid 999). Docker named
          # volumes inherit ownership from whatever was on the image at
          # FIRST mount, which on some hosts is root — the non-root container
          # user then can't write /app/data/blobs and gunicorn workers crash
          # with PermissionError. Fix it deterministically on every deploy
          # using a one-shot root container.
          docker volume create matrixhub_data >/dev/null
          docker run --rm \
            -v matrixhub_data:/app/data \
            alpine:3.20 \
            sh -lc "
              mkdir -p /app/data/blobs
              chown -R ${UID_INSIDE}:${GID_INSIDE} /app/data
              chmod -R u+rwX,g+rwX /app/data
              ls -la /app/data | sed 's/^/  /'
            "

          echo "=== Starting ${CONTAINER} (memory=${MEM}, cpus=${CPUS}) ==="
          # Resource caps prevent a runaway container from OOM-killing the
          # host on a 1 GB VM.Standard.E2.1.Micro. Tune via the workflow
          # env CONTAINER_MEMORY / CONTAINER_CPUS.
          docker run -d \
            --name "${CONTAINER}" \
            --restart unless-stopped \
            -p 443:443 \
            -p 4444:4444 \
            --memory "${MEM}" \
            --memory-swap "${MEM}" \
            --cpus "${CPUS}" \
            --log-driver json-file \
            --log-opt max-size=10m \
            --log-opt max-file=3 \
            --env-file "${ENV_FILE}" \
            -v matrixhub_data:/app/data \
            -v "${TLS_DIR}:/etc/ssl/matrixhub:ro" \
            "${IMAGE}:${TAG}"

          echo "=== Waiting for Docker HEALTHCHECK to report 'healthy' ==="
          # Prefer the image's HEALTHCHECK over a single curl probe — the
          # Dockerfile already runs it on a 30s schedule and accounts for
          # warmup. Fall back to curl if the image has no healthcheck.
          HAS_HC="$(docker inspect -f '{{if .State.Health}}true{{else}}false{{end}}' "${CONTAINER}" 2>/dev/null || echo false)"
          RETRIES=0
          MAX_RETRIES=60   # ~3 minutes total

          if [ "${HAS_HC}" = "true" ]; then
            until [ "$(docker inspect -f '{{.State.Health.Status}}' "${CONTAINER}" 2>/dev/null)" = "healthy" ]; do
              status="$(docker inspect -f '{{.State.Health.Status}}' "${CONTAINER}" 2>/dev/null || echo none)"
              RETRIES=$((RETRIES + 1))
              if [ "$RETRIES" -ge "$MAX_RETRIES" ]; then
                echo "ERROR: container did not become healthy (last: ${status})."
                docker ps -a || true
                docker logs --tail 200 "${CONTAINER}" || true
                exit 1
              fi
              echo "Waiting... (${RETRIES}/${MAX_RETRIES}) status=${status}"
              sleep 3
            done
            echo "Container HEALTHCHECK reports: healthy"
          else
            # Fallback: probe HTTPS /health directly. Use -k because the
            # Cloudflare Origin Cert isn't in the system trust store.
            until curl -kfsS --max-time 5 "https://127.0.0.1:443/health" >/dev/null 2>&1; do
              RETRIES=$((RETRIES + 1))
              if [ "$RETRIES" -ge "$MAX_RETRIES" ]; then
                echo "ERROR: health check failed after ${MAX_RETRIES} attempts."
                docker ps -a || true
                docker logs --tail 200 "${CONTAINER}" || true
                exit 1
              fi
              echo "Waiting... (${RETRIES}/${MAX_RETRIES})"
              sleep 3
            done
          fi

          echo "=== Local /health?check_db=true ==="
          curl -ksS "https://127.0.0.1:443/health?check_db=true" | python3 -m json.tool || true

          echo "=== Strict TLS check on :443 ==="
          # Industry best-practice: enforce a real TLS handshake against the
          # origin and FAIL the deploy if anything is wrong, instead of
          # warning silently. Cloudflare Origin Certs are signed by a private
          # Cloudflare CA that is NOT in the system trust store, so we fetch
          # the two Cloudflare Origin Root CAs (RSA + ECC) into a temp bundle
          # and pass that via -CAfile. Without this, -verify_return_error
          # would always fail with "unable to verify the first certificate".
          CA_BUNDLE="$(mktemp)"
          curl -fsSL --max-time 10 \
            https://developers.cloudflare.com/ssl/static/origin_ca_rsa_root.pem \
            > "${CA_BUNDLE}" || true
          curl -fsSL --max-time 10 \
            https://developers.cloudflare.com/ssl/static/origin_ca_ecc_root.pem \
            >> "${CA_BUNDLE}" || true

          if [ ! -s "${CA_BUNDLE}" ]; then
            echo "::warning::Could not fetch Cloudflare Origin Root CAs; falling back to non-verifying handshake."
            VERIFY_OPTS=""
          else
            VERIFY_OPTS="-CAfile ${CA_BUNDLE} -verify_return_error"
          fi

          if echo | timeout 8 openssl s_client \
                 -connect 127.0.0.1:443 \
                 -servername api.matrixhub.io \
                 ${VERIFY_OPTS} \
                 2>/tmp/matrixhub_tls_check.err \
               | tee /tmp/matrixhub_tls_check.out \
               | grep -qE '^subject='; then
            echo "TLS handshake on :443 OK"
            grep -E '^(subject|issuer)=' /tmp/matrixhub_tls_check.out | sed 's/^/  /'
          else
            echo "::error::Container is not negotiating valid TLS on :443."
            echo "--- openssl stderr ---"
            cat /tmp/matrixhub_tls_check.err || true
            echo "--- last 120 lines of container log ---"
            docker logs --tail 120 "${CONTAINER}" || true
            exit 1
          fi
          rm -f "${CA_BUNDLE}"

          echo "=== Resource usage after start ==="
          docker stats --no-stream "${CONTAINER}" 2>/dev/null \
            | sed 's/^/  /' || true

          echo "=== Cleaning old Docker images ==="
          docker image prune -f || true

          echo "=== Deploy complete ==="
          DEPLOY_SCRIPT

      - name: Verify deployment externally
        shell: bash
        run: |
          set -euo pipefail

          echo "Verifying external access to ${PUBLIC_HEALTH_URL}"
          sleep 5

          STATUS="$(curl -sS -o /tmp/health.json -w '%{http_code}' --max-time 20 "${PUBLIC_HEALTH_URL}" || echo 000)"

          echo "HTTP ${STATUS}"

          if [ -s /tmp/health.json ]; then
            head -c 1000 /tmp/health.json
            echo
          fi

          # Best-practice #2: HTTP 525 means Cloudflare reached the edge
          # but the origin's TLS handshake failed. That's a hard failure —
          # `/status` will be red and every public request 5xxs — so fail
          # the deploy instead of letting the next push silently overwrite
          # a known-good image.
          if [ "$STATUS" = "525" ]; then
            echo "::error::HTTP 525 — Cloudflare cannot complete TLS handshake to the origin."
            echo "Confirm the Cloudflare Origin Cert is at ${TLS_HOST_DIR}/cf-origin.{pem,key}"
            echo "and that the matrix-hub container started with that path mounted."
            exit 1
          elif [ "$STATUS" != "200" ]; then
            echo "::error::External health check returned HTTP ${STATUS}."
            exit 1
          fi

      - name: Deployment summary
        if: always()
        shell: bash
        run: |
          {
            echo "## OCI deployment"
            echo
            echo "- Image: \`${{ env.DOCKER_IMAGE }}:${{ steps.tag.outputs.TAG || 'latest' }}\`"
            echo "- Host: \`${{ secrets.OCI_HOST }}\`"
            echo "- User: \`${{ secrets.OCI_USER }}\`"
            echo "- Container: \`${{ env.CONTAINER_NAME }}\` (memory=${{ env.CONTAINER_MEMORY }}, cpus=${{ env.CONTAINER_CPUS }}, runs as uid=${{ env.CONTAINER_UID }})"
            echo "- TLS dir on host: \`${{ env.TLS_HOST_DIR }}\` (mounted ro into the container)"
            if [ -n "${{ secrets.CF_ORIGIN_CERT }}" ] && [ -n "${{ secrets.CF_ORIGIN_KEY }}" ]; then
              echo "- TLS material managed by workflow (CF_ORIGIN_CERT / CF_ORIGIN_KEY secrets)"
            else
              echo "- TLS material managed manually on the VM (no CF_ORIGIN_* secrets set)"
            fi
            if [ -n "${{ secrets.AIVEN_DATABASE_URL }}" ]; then
              echo "- DATABASE_URL pinned to Aiven by AIVEN_DATABASE_URL secret"
            else
              echo "- DATABASE_URL left as-is in the VM's .env (no AIVEN_DATABASE_URL secret set)"
            fi
            echo "- Health URL: \`${{ env.PUBLIC_HEALTH_URL }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify on failure
        if: failure()
        shell: bash
        run: |
          echo "::error::Deployment to OCI failed."
          echo
          echo "Manual recovery on the Hub VM:"
          echo "  docker pull ${{ env.DOCKER_IMAGE }}:latest"
          echo "  for n in ${{ env.CONTAINER_NAME }} matrixhub; do docker stop \$n 2>/dev/null || true; docker rm \$n 2>/dev/null || true; done"
          echo "  docker volume create matrixhub_data >/dev/null"
          echo "  docker run --rm -v matrixhub_data:/app/data alpine:3.20 sh -lc 'mkdir -p /app/data/blobs && chown -R ${{ env.CONTAINER_UID }}:${{ env.CONTAINER_GID }} /app/data && chmod -R u+rwX,g+rwX /app/data'"
          echo "  docker run -d --name ${{ env.CONTAINER_NAME }} --restart unless-stopped \\"
          echo "    -p 443:443 -p 4444:4444 \\"
          echo "    --memory ${{ env.CONTAINER_MEMORY }} --memory-swap ${{ env.CONTAINER_MEMORY }} --cpus ${{ env.CONTAINER_CPUS }} \\"
          echo "    --log-driver json-file --log-opt max-size=10m --log-opt max-file=3 \\"
          echo "    --env-file ~/matrix-hub/.env \\"
          echo "    -v matrixhub_data:/app/data \\"
          echo "    -v ${{ env.TLS_HOST_DIR }}:/etc/ssl/matrixhub:ro \\"
          echo "    ${{ env.DOCKER_IMAGE }}:latest"
