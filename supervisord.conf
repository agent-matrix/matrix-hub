# /supervisord.conf

[supervisord]
nodaemon=true
user=app

[program:hub]
; Conditionally enable TLS based on the presence of the Cloudflare Origin
; Certificate at /etc/ssl/matrixhub. The deploy workflow mounts the host's
; /etc/ssl/matrixhub directory into the container read-only:
;   docker run … -v /etc/ssl/matrixhub:/etc/ssl/matrixhub:ro …
; If the cert+key are present, gunicorn terminates TLS on :443 (the path
; Cloudflare Full-strict expects). If they're not, gunicorn falls back to
; plaintext on :443 with a loud warning so dev / mis-deployment surfaces
; quickly instead of silently 525'ing every public request.
command=/bin/bash -lc '
  CERT=/etc/ssl/matrixhub/cf-origin.pem
  KEY=/etc/ssl/matrixhub/cf-origin.key
  if [ -s "$CERT" ] && [ -s "$KEY" ]; then
    echo "[hub] TLS material found at $CERT / $KEY — gunicorn will terminate TLS on :443"
    exec /app/.venv/bin/gunicorn src.app:app \
      -k uvicorn.workers.UvicornWorker \
      --bind 0.0.0.0:443 \
      --certfile "$CERT" \
      --keyfile  "$KEY"
  else
    echo "[hub] WARNING: no TLS material at /etc/ssl/matrixhub — starting PLAINTEXT on :443. Cloudflare will return 525 until the cert is mounted."
    exec /app/.venv/bin/gunicorn src.app:app \
      -k uvicorn.workers.UvicornWorker \
      --bind 0.0.0.0:443
  fi'
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:gateway]
; Run the gateway as a CLI, not through a module import
command=/bin/bash -lc '
  cd /app/mcpgateway \
  && . .venv/bin/activate \
  && set -a; [ -f .env ] && . ./.env; set +a \
  && python -m mcpgateway.db \
  && exec mcpgateway --host "${HOST:-0.0.0.0}" --port "${PORT:-4444}"'
directory=/app/mcpgateway
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
