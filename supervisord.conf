# /supervisord.conf
#
# Two long-lived processes inside the container:
#
#   [program:hub]      → matrix-hub FastAPI on :443 (TLS-terminating
#                        with the Cloudflare Origin Cert mounted at
#                        /etc/ssl/matrixhub).
#   [program:gateway]  → mcpgateway on :4444 (cleartext, internal).
#
# Both ports are EXPLICITLY hard-coded here. We do NOT honour HOST/PORT
# from the environment because docker --env-file injects matrix-hub's
# HOST/PORT into every supervised program, and a stray PORT=443 in
# /home/ubuntu/matrix-hub/.env (a recurring operator footgun) causes
# mcpgateway to win the :443 bind race, after which the Hub gunicorn
# crash-loops forever with "Address already in use" and Cloudflare
# returns 525 / /status flips to "Database: Unavailable".

[supervisord]
nodaemon=true
user=app

[program:hub]
; Conditionally enable TLS based on the presence of the Cloudflare Origin
; Certificate at /etc/ssl/matrixhub. The deploy workflow mounts the host's
; /etc/ssl/matrixhub directory into the container read-only:
;   docker run … -v /etc/ssl/matrixhub:/etc/ssl/matrixhub:ro …
; If the cert+key are present, gunicorn terminates TLS on :443 (the path
; Cloudflare Full-strict expects). If they're not, gunicorn falls back to
; plaintext on :443 with a loud warning so dev / mis-deployment surfaces
; quickly instead of silently 525'ing every public request.
;
; HOST/PORT from --env-file are intentionally ignored — :443 is hard-coded.
command=/bin/bash -lc '
  CERT=/etc/ssl/matrixhub/cf-origin.pem
  KEY=/etc/ssl/matrixhub/cf-origin.key
  if [ -s "$CERT" ] && [ -s "$KEY" ]; then
    echo "[hub] TLS material found at $CERT / $KEY — gunicorn will terminate TLS on :443"
    exec /app/.venv/bin/gunicorn src.app:app \
      -k uvicorn.workers.UvicornWorker \
      --bind 0.0.0.0:443 \
      --certfile "$CERT" \
      --keyfile  "$KEY"
  else
    echo "[hub] WARNING: no TLS material at /etc/ssl/matrixhub — starting PLAINTEXT on :443. Cloudflare will return 525 until the cert is mounted."
    exec /app/.venv/bin/gunicorn src.app:app \
      -k uvicorn.workers.UvicornWorker \
      --bind 0.0.0.0:443
  fi'
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:gateway]
; Run the gateway as a CLI on :4444 (cleartext, internal-only).
;
; CRITICAL: unset HOST and PORT BEFORE sourcing mcpgateway/.env so that
; any HOST=0.0.0.0 / PORT=443 leaked from the matrix-hub --env-file
; cannot make the gateway race the Hub for :443. The --host/--port
; flags below are absolute — even if mcpgateway/.env redefines PORT,
; the CLI flag wins.
command=/bin/bash -lc '
  cd /app/mcpgateway \
  && unset HOST PORT \
  && . .venv/bin/activate \
  && set -a; [ -f .env ] && . ./.env; set +a \
  && unset HOST PORT \
  && python -m mcpgateway.db \
  && exec mcpgateway --host 0.0.0.0 --port 4444'
directory=/app/mcpgateway
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
